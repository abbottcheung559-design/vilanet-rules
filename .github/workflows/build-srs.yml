name: build-srs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install sing-box
        run: |
          go install github.com/sagernet/sing-box/cmd/sing-box@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build SRS files
        run: |
          mkdir -p dist

          sing-box rule-set compile geosite-proxy.json -o dist/geosite-proxy.srs
          sing-box rule-set compile geosite-direct.json -o dist/geosite-direct.srs
          sing-box rule-set compile geoip-proxy.json -o dist/geoip-proxy.srs
          sing-box rule-set compile geoip-direct.json -o dist/geoip-direct.srs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: srs-files
          path: dist/

      - name: Commit dist files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/*.srs
          git commit -m "Update SRS files" || echo "No changes to commit"
          git push
